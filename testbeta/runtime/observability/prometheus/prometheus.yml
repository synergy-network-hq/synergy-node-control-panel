global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: synergy_rpc_exporter
    static_configs:
      - targets: ["synergy-rpc-exporter:9168"]

  - job_name: monitoring_host_node_exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: testbeta_node_exporters
    static_configs:
      - targets:
          - "192.168.11.228:9100"
          - "192.168.1.65:9100"
          - "192.168.11.178:9100"
          - "192.168.1.98:9100"
          - "192.168.11.229:9100"
          - "74.208.227.23:9100"
          - "192.168.11.98:9100"
          - "192.168.11.191:9100"
          - "194.163.183.166:9100"
          - "78.23.204.168:9100"
