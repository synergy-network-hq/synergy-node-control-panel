name: Electron Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: macos-dmg
            build_cmd: npx electron-builder --config electron-builder.yml --mac dmg --publish never
            artifact_glob: electron-dist/*.dmg
          - os: ubuntu-22.04
            artifact_name: linux-deb
            build_cmd: npx electron-builder --config electron-builder.yml --linux deb --publish never
            artifact_glob: electron-dist/*.deb
          - os: windows-latest
            artifact_name: windows-nsis
            build_cmd: npx electron-builder --config electron-builder.yml --win nsis --publish never
            artifact_glob: electron-dist/*.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm install

      - name: Create .env if missing
        shell: bash
        run: |
          if [ ! -f .env ]; then
            echo "# CI placeholder" > .env
          fi

      - name: Install Linux packaging dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libarchive-tools \
            fakeroot \
            rpm \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Build renderer assets
        run: npm run build

      - name: Build headless control-service runtime
        run: cargo build --manifest-path src-tauri/Cargo.toml --bin control-service --release --no-default-features

      - name: Stage Electron runtime bundle
        run: node scripts/electron/prepare-runtime.mjs

      - name: Build installer
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: ${{ matrix.build_cmd }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
