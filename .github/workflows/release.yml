name: Electron Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TESTNET_REF: ${{ github.ref_name }}
  TESTNET_SOURCE_REPOSITORY: ${{ vars.TESTNET_SOURCE_REPOSITORY || 'synergy-network-hq/testnet' }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact_name: macos
            build_cmd: npx electron-builder --config electron-builder.yml --mac dmg zip --publish never
            artifact_glob: |
              electron-dist/*.dmg
              electron-dist/*.zip
              electron-dist/*.yml
              electron-dist/*.yaml
              electron-dist/*.blockmap
          - os: ubuntu-22.04
            artifact_name: linux
            build_cmd: npx electron-builder --config electron-builder.yml --linux deb AppImage --publish never
            artifact_glob: |
              electron-dist/*.deb
              electron-dist/*.AppImage
              electron-dist/*.yml
              electron-dist/*.yaml
              electron-dist/*.blockmap
          - os: windows-latest
            artifact_name: windows
            build_cmd: npx electron-builder --config electron-builder.yml --win nsis --publish never
            artifact_glob: |
              electron-dist/*.exe
              electron-dist/*.yml
              electron-dist/*.yaml
              electron-dist/*.blockmap

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Checkout Testnet node source
        shell: bash
        env:
          TESTNET_REPO_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          set -euo pipefail

          TESTNET_SOURCE_REPOSITORY="${TESTNET_SOURCE_REPOSITORY:-synergy-network-hq/testnet}"

          if [[ -n "${TESTNET_REPO_TOKEN:-}" ]]; then
            auth_header="$(printf 'x-access-token:%s' "$TESTNET_REPO_TOKEN" | base64 | tr -d '\n')"
            git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" clone \
              --depth 1 \
              --branch "${TESTNET_REF}" \
              --single-branch \
              "https://github.com/${TESTNET_SOURCE_REPOSITORY}.git" \
              testnet-source
          else
            git clone \
              --depth 1 \
              --branch "${TESTNET_REF}" \
              --single-branch \
              "https://github.com/${TESTNET_SOURCE_REPOSITORY}.git" \
              testnet-source
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate Testnet genesis alignment
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');

          (async () => {
            const readJson = (filePath) => JSON.parse(fs.readFileSync(filePath, 'utf8'));
            const readGenesisIdentity = (filePath) => {
              const payload = JSON.parse(fs.readFileSync(filePath, 'utf8'));
              const hash = payload?.integrity?.genesis_hash;
              if (!hash) {
                throw new Error(`${filePath} is missing integrity.genesis_hash`);
              }
              return {
                chainId: payload?.network?.chain_id,
                nativeNetworkId: payload?.network?.network_id,
                hash: String(hash).trim().toLowerCase(),
                magic: String(payload?.p2p_identity?.network_magic_bytes || '').trim().toLowerCase(),
                chainIdHex: String(payload?.network_identity?.synergy_native_chain_id_hex || '').trim().toLowerCase(),
              };
            };

            const source = readGenesisIdentity('testnet-source/config/genesis.json');
            const bundled = readGenesisIdentity('testnet/runtime/configs/genesis/genesis.json');
            if (source.hash !== bundled.hash || source.magic !== bundled.magic || source.chainId !== bundled.chainId || source.nativeNetworkId !== bundled.nativeNetworkId) {
              throw new Error(`Bundled genesis does not match testnet source. source=${JSON.stringify(source)} bundled=${JSON.stringify(bundled)}`);
            }
            if (bundled.chainId !== 1264 || bundled.nativeNetworkId !== 1264 || bundled.chainIdHex !== '0x4f0') {
              throw new Error(`Bundled genesis must be public Testnet chain 1264. got=${JSON.stringify(bundled)}`);
            }

            const identifiers = readJson('testnet-source/network-identifiers.testnet.json');
            const identifierHash = String(identifiers?.cryptographic_identity?.genesis_hash || '').trim().toLowerCase();
            const identifierMagic = String(identifiers?.cryptographic_identity?.network_magic_bytes?.value || '').trim().toLowerCase();
            const identifierChainHex = String(identifiers?.wallet_metadata?.wallet_add_network_payload?.chainId || '').trim().toLowerCase();
            if (identifierHash !== bundled.hash || identifierMagic !== bundled.magic) {
              throw new Error(`Network identifiers do not match bundled genesis. identifiers=${identifierHash}/${identifierMagic} bundled=${bundled.hash}/${bundled.magic}`);
            }
            if (identifierChainHex && identifierChainHex !== '0x4f0') {
              throw new Error(`Network identifiers must declare chain_id_hex 0x4f0. got=${identifierChainHex}`);
            }

            const manifest = readJson('testnet/runtime/workspace-manifest.json');
            if (manifest?.chain_id !== 1264 && manifest?.chainId !== 1264) {
              throw new Error('Workspace manifest must declare chain ID 1264');
            }
            if (manifest?.chain_id_hex !== '0x4f0') {
              throw new Error('Workspace manifest must declare chain_id_hex 0x4f0');
            }
            if (manifest?.network_id !== 'synergy-testnet-v2') {
              throw new Error('Workspace manifest must declare network_id synergy-testnet-v2');
            }

            console.log(`Testnet genesis alignment OK: ${bundled.hash}`);
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: control-service -> target

      - name: Install frontend dependencies
        run: npm install

      - name: Download trusted Testnet node release binaries
        shell: bash
        run: |
          set -euo pipefail

          TESTNET_SOURCE_REPOSITORY="${TESTNET_SOURCE_REPOSITORY:-synergy-network-hq/testnet}"
          release_base="https://github.com/${TESTNET_SOURCE_REPOSITORY}/releases/download/${TESTNET_REF}"
          mkdir -p binaries

          curl --fail --location --retry 5 --retry-delay 2 \
            --output testnet-latest.json \
            "${release_base}/latest.json"

          sha256_file() {
            node -e 'const crypto = require("node:crypto"); const fs = require("node:fs"); process.stdout.write(crypto.createHash("sha256").update(fs.readFileSync(process.argv[1])).digest("hex"));' "$1"
          }

          release_field() {
            local platform="$1"
            local binary="$2"
            local field="$3"
            node -e '
              const fs = require("node:fs");
              const [platform, binary, field] = process.argv.slice(1);
              const manifest = JSON.parse(fs.readFileSync("testnet-latest.json", "utf8"));
              const value = manifest?.binaries?.[platform]?.[binary]?.[field];
              if (!value) {
                throw new Error(`Missing ${platform}/${binary}/${field} in Testnet latest.json`);
              }
              process.stdout.write(value);
            ' "$platform" "$binary" "$field"
          }

          download_binary() {
            local platform="$1"
            local binary="$2"
            local output_path="$3"
            local url expected actual

            url="$(release_field "$platform" "$binary" url)"
            expected="$(release_field "$platform" "$binary" sha256)"
            curl --fail --location --retry 5 --retry-delay 2 --output "$output_path" "$url"
            actual="$(sha256_file "$output_path")"
            if [[ "$actual" != "$expected" ]]; then
              echo "Checksum mismatch for $output_path from $url" >&2
              echo "expected=$expected actual=$actual" >&2
              exit 1
            fi
            printf "%s  %s\n" "$actual" "$(basename "$output_path")" > "${output_path}.sha256"
          }

          download_binary linux-amd64 synergy-testnet binaries/synergy-testnet-linux-amd64
          download_binary macos-arm64 synergy-testnet binaries/synergy-testnet-darwin-arm64
          cp binaries/synergy-testnet-darwin-arm64 binaries/synergy-testnet-macos-arm64
          printf "%s  %s\n" "$(sha256_file binaries/synergy-testnet-macos-arm64)" "synergy-testnet-macos-arm64" > binaries/synergy-testnet-macos-arm64.sha256
          download_binary windows-amd64 synergy-testnet binaries/synergy-testnet-windows-amd64.exe

          chmod +x binaries/synergy-testnet-linux-amd64 binaries/synergy-testnet-darwin-arm64 binaries/synergy-testnet-macos-arm64

      - name: Regenerate workspace manifest for bundled binaries
        shell: bash
        run: bash scripts/release/generate-workspace-manifest.sh

      - name: Create .env from testnet example if missing
        shell: bash
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env
          fi

      - name: Install Linux packaging dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libarchive-tools \
            fakeroot \
            rpm \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Build renderer assets
        run: npm run build

      - name: Build headless control-service runtime
        run: cargo build --manifest-path control-service/Cargo.toml --bin control-service --release --no-default-features

      - name: Stage Electron runtime bundle
        run: node scripts/electron/prepare-runtime.mjs

      - name: Remove non-portable bundled service bin shims
        shell: bash
        run: |
          set -euo pipefail
          bundle_root="testnet/runtime/installers/Node-EXP/explorer-app"
          if [[ -d "$bundle_root" ]]; then
            find "$bundle_root" -path '*/node_modules/.bin' -type d -prune -exec rm -rf {} +
          fi

      - name: Clear stale packaged artifacts
        shell: bash
        run: rm -rf electron-dist

      - name: Verify macOS signing and notarization inputs
        if: matrix.artifact_name == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          for secret_name in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [[ -z "${!secret_name:-}" ]]; then
              echo "${secret_name} is required for the signed macOS release build." >&2
              exit 1
            fi
          done
          echo "macOS signing and notarization inputs are present."

      - name: Build installer
        shell: bash
        run: ${{ matrix.build_cmd }}

      - name: Remove duplicate builder-debug.yml from artifacts
        shell: bash
        run: rm -f electron-dist/builder-debug.yml

      - name: Upload installer artifacts
        if: github.event_name == 'workflow_dispatch'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}

      - name: Publish installer artifacts to releases repo
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          repo="synergy-network-hq/synergy-node-control-panel-releases"
          title="Synergy Node Control Panel ${tag#v}"
          notes="Automated build from ${GITHUB_REPOSITORY}@${GITHUB_SHA}."

          if ! gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
            gh release create "$tag" --repo "$repo" --title "$title" --notes "$notes" || true
          fi

          shopt -s nullglob
          files=(
            electron-dist/*.dmg
            electron-dist/*.zip
            electron-dist/*.deb
            electron-dist/*.AppImage
            electron-dist/*.exe
            electron-dist/*.yml
            electron-dist/*.yaml
            electron-dist/*.blockmap
          )

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No installer artifacts found under ./electron-dist"
            ls -R electron-dist || true
            exit 1
          fi

          gh release upload "$tag" "${files[@]}" --repo "$repo" --clobber

  publish-releases-repo:
    name: Publish installers to releases repo
    needs: build
    runs-on: ubuntu-latest
    if: false
    steps:
      - run: echo "Installer publication is handled directly in each matrix build job."
