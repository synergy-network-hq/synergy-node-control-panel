name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.3.1)'
        required: true

env:
  RELEASES_REPO: synergy-network-hq/devnet-control-panel-releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Validate updater signing secret
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is required for signed updater bundles." >&2
            exit 1
          fi

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      # env_config.rs embeds .env at compile time via include_str! — provide a placeholder
      - name: Create .env if missing
        shell: bash
        run: |
          if [ ! -f .env ]; then
            echo "# CI placeholder" > .env
          fi

      - name: Install Linux dependencies
        if: matrix.label == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1-dev

      - name: Build Tauri app
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target ${{ matrix.target }}

      # ── Collect artifacts ────────────────────────────────────────────────────

      - name: Collect artifacts (macOS)
        if: matrix.label == 'macos-arm64'
        run: |
          mkdir -p artifacts
          cp src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg          artifacts/ 2>/dev/null || true
          cp src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz artifacts/ 2>/dev/null || true
          cp src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig artifacts/ 2>/dev/null || true
          ls -la artifacts/

      - name: Collect artifacts (Linux)
        if: matrix.label == 'linux-x64'
        run: |
          mkdir -p artifacts
          cp src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb                  artifacts/ 2>/dev/null || true
          cp src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage         artifacts/ 2>/dev/null || true
          cp src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz  artifacts/ 2>/dev/null || true
          cp src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz.sig artifacts/ 2>/dev/null || true
          ls -la artifacts/

      - name: Collect artifacts (Windows)
        if: matrix.label == 'windows-x64'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts
          Copy-Item "src-tauri\target\${{ matrix.target }}\release\bundle\nsis\*.exe"  artifacts\ -ErrorAction SilentlyContinue
          Copy-Item "src-tauri\target\${{ matrix.target }}\release\bundle\nsis\*.exe.zip"  artifacts\ -ErrorAction SilentlyContinue
          Copy-Item "src-tauri\target\${{ matrix.target }}\release\bundle\nsis\*.exe.zip.sig"  artifacts\ -ErrorAction SilentlyContinue
          Copy-Item "src-tauri\target\${{ matrix.target }}\release\bundle\msi\*.msi"   artifacts\ -ErrorAction SilentlyContinue
          Copy-Item "src-tauri\target\${{ matrix.target }}\release\bundle\msi\*.msi.zip"   artifacts\ -ErrorAction SilentlyContinue
          Copy-Item "src-tauri\target\${{ matrix.target }}\release\bundle\msi\*.msi.zip.sig"   artifacts\ -ErrorAction SilentlyContinue
          Get-ChildItem artifacts\

      - name: Validate updater artifacts
        shell: bash
        run: |
          case "${{ matrix.label }}" in
            macos-arm64)
              ls artifacts/*.app.tar.gz artifacts/*.app.tar.gz.sig >/dev/null
              ;;
            linux-x64)
              ls artifacts/*.AppImage.tar.gz artifacts/*.AppImage.tar.gz.sig >/dev/null
              ;;
            windows-x64)
              ls artifacts/*.exe.zip artifacts/*.exe.zip.sig >/dev/null 2>&1 || \
                ls artifacts/*.msi.zip artifacts/*.msi.zip.sig >/dev/null
              ;;
          esac

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.label }}
          path: artifacts/*

  # ── Publish: generate latest.json and create release on public releases repo ──

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Determine version tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find all-artifacts -type f -exec cp {} release-assets/ \;
          echo "=== Release assets ==="
          ls -la release-assets/

      - name: Generate latest.json
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          chmod +x scripts/release/generate-latest-json.sh
          scripts/release/generate-latest-json.sh release-assets "$VERSION" "${{ env.RELEASES_REPO }}"
          echo "=== latest.json ==="
          cat release-assets/latest.json

      - name: Create GitHub Release on releases repo
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASES_REPO }}
          tag_name: ${{ steps.tag.outputs.version }}
          name: "Synergy Devnet Control Panel ${{ steps.tag.outputs.version }}"
          body: |
            ## Synergy Devnet Control Panel ${{ steps.tag.outputs.version }}

            ### Installation
            | Platform | Download |
            |----------|----------|
            | macOS (Apple Silicon) | `.dmg` |
            | Linux (x86_64) | `.deb` or `.AppImage` |
            | Windows (x86_64) | `.exe` (NSIS installer) |

            ### Auto-Update
            Machines with the control panel already installed will be notified via
            the **Check for Updates** button in the app.

            ---
            *Built from commit ${{ github.sha }}*
          files: release-assets/*
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          draft: false
          prerelease: false
