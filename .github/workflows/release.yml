name: Electron Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TESTNET_BETA_REF: ${{ github.ref_name }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact_name: macos
            build_cmd: npx electron-builder --config electron-builder.yml --mac dmg zip --publish never
            artifact_glob: |
              electron-dist/*.dmg
              electron-dist/*.zip
              electron-dist/*.yml
              electron-dist/*.yaml
              electron-dist/*.blockmap
          - os: ubuntu-22.04
            artifact_name: linux
            build_cmd: npx electron-builder --config electron-builder.yml --linux deb AppImage --publish never
            artifact_glob: |
              electron-dist/*.deb
              electron-dist/*.AppImage
              electron-dist/*.yml
              electron-dist/*.yaml
              electron-dist/*.blockmap
          - os: windows-latest
            artifact_name: windows
            build_cmd: npx electron-builder --config electron-builder.yml --win nsis --publish never
            artifact_glob: |
              electron-dist/*.exe
              electron-dist/*.yml
              electron-dist/*.yaml
              electron-dist/*.blockmap

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Checkout Testnet-Beta node source
        shell: bash
        env:
          TESTNET_BETA_REPO_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${TESTNET_BETA_REPO_TOKEN:-}" ]]; then
            echo "RELEASES_REPO_TOKEN is required to checkout synergy-network-hq/testnet-beta." >&2
            exit 1
          fi

          auth_header="$(printf 'x-access-token:%s' "$TESTNET_BETA_REPO_TOKEN" | base64 | tr -d '\n')"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" clone \
            --depth 1 \
            --branch "${TESTNET_BETA_REF}" \
            --single-branch \
            https://github.com/synergy-network-hq/testnet-beta.git \
            testnet-beta-source

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate Testnet-Beta genesis alignment
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');

          (async () => {
            const publicRpc = 'https://testbeta-core-rpc.synergy-network.io';
            const readHash = (filePath) => {
              const payload = JSON.parse(fs.readFileSync(filePath, 'utf8'));
              const hash = payload?.integrity?.genesis_hash;
              if (!hash) {
                throw new Error(`${filePath} is missing integrity.genesis_hash`);
              }
              return String(hash).trim().toLowerCase();
            };

            const sourceHash = readHash('testnet-beta-source/config/genesis.json');
            const bundledHash = readHash('testbeta/runtime/configs/genesis/genesis.json');
            if (sourceHash !== bundledHash) {
              throw new Error(`Bundled genesis does not match testnet-beta source. source=${sourceHash} bundled=${bundledHash}`);
            }

            const request = async () => {
              const response = await fetch(publicRpc, {
                method: 'POST',
                headers: { 'content-type': 'application/json' },
                body: JSON.stringify({
                  jsonrpc: '2.0',
                  method: 'synergy_getBlockByNumber',
                  params: [0],
                  id: 1,
                }),
              });
              if (!response.ok) {
                throw new Error(`public RPC returned HTTP ${response.status}`);
              }
              const payload = await response.json();
              const liveHash = String(payload?.result?.hash || '').trim().toLowerCase();
              if (!liveHash) {
                throw new Error(`public RPC block 0 response did not include a hash: ${JSON.stringify(payload).slice(0, 400)}`);
              }
              return liveHash;
            };

            let liveHash = '';
            let lastError;
            for (let attempt = 1; attempt <= 3; attempt += 1) {
              try {
                liveHash = await request();
                break;
              } catch (error) {
                lastError = error;
                await new Promise((resolve) => setTimeout(resolve, 2000 * attempt));
              }
            }

            if (!liveHash) {
              throw lastError || new Error('Unable to read live public genesis hash');
            }
            if (liveHash !== bundledHash) {
              throw new Error(`Bundled genesis does not match live Testnet-Beta block 0. live=${liveHash} bundled=${bundledHash}`);
            }

            console.log(`Testnet-Beta genesis alignment OK: ${bundledHash}`);
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: control-service -> target

      - name: Install frontend dependencies
        run: npm install

      - name: Build fresh Testnet-Beta node binary
        shell: bash
        run: |
          set -euo pipefail

          cargo build --manifest-path testnet-beta-source/src/Cargo.toml --release --bin synergy-testbeta

          mkdir -p binaries
          case "${{ matrix.artifact_name }}" in
            macos)
              cp testnet-beta-source/target/release/synergy-testbeta binaries/synergy-testbeta-darwin-arm64
              cp testnet-beta-source/target/release/synergy-testbeta binaries/synergy-testbeta-macos-arm64
              chmod +x binaries/synergy-testbeta-darwin-arm64 binaries/synergy-testbeta-macos-arm64
              ;;
            linux)
              cp testnet-beta-source/target/release/synergy-testbeta binaries/synergy-testbeta-linux-amd64
              chmod +x binaries/synergy-testbeta-linux-amd64
              ;;
            windows)
              cp testnet-beta-source/target/release/synergy-testbeta.exe binaries/synergy-testbeta-windows-amd64.exe
              ;;
            *)
              echo "Unsupported release target: ${{ matrix.artifact_name }}" >&2
              exit 1
              ;;
          esac

      - name: Regenerate workspace manifest for bundled binaries
        shell: bash
        run: bash scripts/release/generate-workspace-manifest.sh

      - name: Create .env from testbeta example if missing
        shell: bash
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env
          fi

      - name: Install Linux packaging dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libarchive-tools \
            fakeroot \
            rpm \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Build renderer assets
        run: npm run build

      - name: Build headless control-service runtime
        run: cargo build --manifest-path control-service/Cargo.toml --bin control-service --release --no-default-features

      - name: Stage Electron runtime bundle
        run: node scripts/electron/prepare-runtime.mjs

      - name: Remove non-portable bundled service bin shims
        shell: bash
        run: |
          set -euo pipefail
          bundle_root="testbeta/runtime/installers/Node-EXP/explorer-app"
          if [[ -d "$bundle_root" ]]; then
            find "$bundle_root" -path '*/node_modules/.bin' -type d -prune -exec rm -rf {} +
          fi

      - name: Clear stale packaged artifacts
        shell: bash
        run: rm -rf electron-dist

      - name: Build installer
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: ${{ matrix.build_cmd }}

      - name: Remove duplicate builder-debug.yml from artifacts
        shell: bash
        run: rm -f electron-dist/builder-debug.yml

      - name: Upload installer artifacts
        if: github.event_name == 'workflow_dispatch'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}

      - name: Publish installer artifacts to releases repo
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          repo="synergy-network-hq/synergy-node-control-panel-releases"
          title="Synergy Node Control Panel ${tag#v}"
          notes="Automated build from ${GITHUB_REPOSITORY}@${GITHUB_SHA}."

          if ! gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
            gh release create "$tag" --repo "$repo" --title "$title" --notes "$notes" || true
          fi

          shopt -s nullglob
          files=(
            electron-dist/*.dmg
            electron-dist/*.zip
            electron-dist/*.deb
            electron-dist/*.AppImage
            electron-dist/*.exe
            electron-dist/*.yml
            electron-dist/*.yaml
            electron-dist/*.blockmap
          )

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No installer artifacts found under ./electron-dist"
            ls -R electron-dist || true
            exit 1
          fi

          gh release upload "$tag" "${files[@]}" --repo "$repo" --clobber

  publish-releases-repo:
    name: Publish installers to releases repo
    needs: build
    runs-on: ubuntu-latest
    if: false
    steps:
      - run: echo "Installer publication is handled directly in each matrix build job."
