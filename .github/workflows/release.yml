# ─────────────────────────────────────────────────────────────────────────────
# Synergy Devnet Control Center — Cross-Platform Release Build
# ─────────────────────────────────────────────────────────────────────────────
# Triggers when you push a tag like "v2.0.3".
# Builds for macOS (ARM + Intel), Linux (x86_64), and Windows (x86_64).
# Publishes installers + signed update bundles to the PUBLIC releases repo.
# ─────────────────────────────────────────────────────────────────────────────

name: Release Build

on:
  push:
    tags:
      - 'v*'

  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.0.3)'
        required: true

env:
  RELEASES_REPO: synergy-network-hq/devnet-control-panel-releases

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Build matrix: macOS ARM, macOS Intel, Linux, Windows
  # ───────────────────────────────────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
            bundles: app,dmg
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
            bundles: app,dmg
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64
            bundles: deb,appimage
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
            bundles: nsis,msi

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      # Ensure .env exists (embedded at compile time by env_config.rs)
      - name: Create .env if missing
        run: |
          if [ ! -f .env ]; then
            echo "# CI placeholder — real values are set per-machine at runtime" > .env
          fi
        shell: bash

      - name: Validate updater signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]]; then
            echo "::error::Missing TAURI_SIGNING_PRIVATE_KEY secret. Updater bundles/signatures cannot be generated."
            exit 1
          fi

      - name: Validate updater artifact generation config
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const confPath = 'src-tauri/tauri.conf.json';
          const conf = JSON.parse(fs.readFileSync(confPath, 'utf8'));
          const value = conf?.bundle?.createUpdaterArtifacts;
          const valid = value === true || value === 'v1Compatible';
          if (!valid) {
            console.error(
              '::error::src-tauri/tauri.conf.json must set bundle.createUpdaterArtifacts=true (or "v1Compatible") so updater bundles/signatures are produced.'
            );
            process.exit(1);
          }
          console.log(`bundle.createUpdaterArtifacts=${value}`);
          NODE

      # Linux-specific: install system libraries Tauri needs
      - name: Install Linux dependencies
        if: matrix.label == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1-dev

      # Build the Tauri app directly via npx (not tauri-action),
      # using platform-valid installer bundle types.
      - name: Build Tauri app (Unix)
        if: runner.os != 'Windows'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: npx tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Build Tauri app (Windows)
        if: runner.os == 'Windows'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: npx tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      # ─── Collect build artifacts ──────────────────────────────────────────
      - name: Collect artifacts (macOS)
        if: startsWith(matrix.label, 'macos')
        run: |
          mkdir -p artifacts
          # .dmg installer for new installs
          cp src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg artifacts/ 2>/dev/null || true
          # .app.tar.gz + .sig for Tauri updater
          cp src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.tar.gz artifacts/ 2>/dev/null || true
          cp src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.sig artifacts/ 2>/dev/null || true
          # Rename to include arch for clarity
          cd artifacts
          for f in *.dmg; do
            [ -f "$f" ] && mv "$f" "${f%.dmg}_${{ matrix.label }}.dmg" 2>/dev/null || true
          done
          for f in *.app.tar.gz; do
            [ -f "$f" ] && mv "$f" "${f%.app.tar.gz}_${{ matrix.label }}.app.tar.gz" 2>/dev/null || true
          done
          for f in *.app.tar.gz.sig; do
            [ -f "$f" ] && mv "$f" "${f%.app.tar.gz.sig}_${{ matrix.label }}.app.tar.gz.sig" 2>/dev/null || true
          done
          cd ..
          echo "=== Artifacts ==="
          ls -la artifacts/

      - name: Collect artifacts (Linux)
        if: matrix.label == 'linux-x64'
        run: |
          mkdir -p artifacts
          # .deb and .AppImage for new installs
          cp src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb artifacts/ 2>/dev/null || true
          cp src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage artifacts/ 2>/dev/null || true
          # .AppImage.tar.gz + .sig for Tauri updater
          cp src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.tar.gz artifacts/ 2>/dev/null || true
          cp src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.sig artifacts/ 2>/dev/null || true
          echo "=== Artifacts ==="
          ls -la artifacts/

      - name: Collect artifacts (Windows)
        if: matrix.label == 'windows-x64'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts
          # .msi and .nsis installer for new installs
          Copy-Item "src-tauri\target\${{ matrix.target }}\release\bundle\msi\*.msi" artifacts\ -ErrorAction SilentlyContinue
          Copy-Item "src-tauri\target\${{ matrix.target }}\release\bundle\nsis\*.exe" artifacts\ -ErrorAction SilentlyContinue
          # .msi.zip + .sig for Tauri updater
          Copy-Item "src-tauri\target\${{ matrix.target }}\release\bundle\msi\*.zip" artifacts\ -ErrorAction SilentlyContinue
          Copy-Item "src-tauri\target\${{ matrix.target }}\release\bundle\msi\*.sig" artifacts\ -ErrorAction SilentlyContinue
          Copy-Item "src-tauri\target\${{ matrix.target }}\release\bundle\nsis\*.zip" artifacts\ -ErrorAction SilentlyContinue
          Copy-Item "src-tauri\target\${{ matrix.target }}\release\bundle\nsis\*.sig" artifacts\ -ErrorAction SilentlyContinue
          Write-Host "=== Artifacts ==="
          Get-ChildItem artifacts\

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.label }}
          path: artifacts/*

  # ───────────────────────────────────────────────────────────────────────────
  # Publish: collect all artifacts + generate latest.json + push to releases repo
  # ───────────────────────────────────────────────────────────────────────────
  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source (for version info)
        uses: actions/checkout@v4

      - name: Determine version tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find all-artifacts -type f -exec cp {} release-assets/ \;
          echo "=== Release assets ==="
          ls -la release-assets/

      # ─── Generate latest.json for Tauri updater ───────────────────────────
      - name: Generate latest.json
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          VERSION_NUM="${VERSION#v}"
          RELEASE_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          BASE_URL="https://github.com/${{ env.RELEASES_REPO }}/releases/download/${VERSION}"

          # Helper: find a file matching a pattern and return its basename
          find_file() {
            local pattern="$1"
            local result
            result=$(find release-assets -name "$pattern" -type f 2>/dev/null | head -1)
            if [[ -n "$result" ]]; then
              basename "$result"
            fi
          }

          # Helper: read signature from a .sig file
          read_sig() {
            local pattern="$1"
            local sig_file
            sig_file=$(find release-assets -name "$pattern" -type f 2>/dev/null | head -1)
            if [[ -f "$sig_file" ]]; then
              cat "$sig_file"
            fi
          }

          require_non_empty() {
            local value="$1"
            local label="$2"
            if [[ -z "$value" ]]; then
              echo "::error::Missing ${label} in release-assets."
              ls -la release-assets/
              exit 1
            fi
          }

          # macOS ARM
          MACOS_ARM_BUNDLE=$(find_file "*macos-arm64.app.tar.gz")
          MACOS_ARM_SIG=$(read_sig "*macos-arm64.app.tar.gz.sig")
          require_non_empty "$MACOS_ARM_BUNDLE" "macOS ARM updater bundle (*.app.tar.gz)"
          require_non_empty "$MACOS_ARM_SIG" "macOS ARM updater signature (*.app.tar.gz.sig)"

          # macOS Intel
          MACOS_X64_BUNDLE=$(find_file "*macos-x64.app.tar.gz")
          MACOS_X64_SIG=$(read_sig "*macos-x64.app.tar.gz.sig")
          require_non_empty "$MACOS_X64_BUNDLE" "macOS Intel updater bundle (*.app.tar.gz)"
          require_non_empty "$MACOS_X64_SIG" "macOS Intel updater signature (*.app.tar.gz.sig)"

          # Linux
          LINUX_BUNDLE=$(find_file "*.AppImage.tar.gz")
          LINUX_SIG=$(read_sig "*.AppImage.tar.gz.sig")
          require_non_empty "$LINUX_BUNDLE" "Linux updater bundle (*.AppImage.tar.gz)"
          require_non_empty "$LINUX_SIG" "Linux updater signature (*.AppImage.tar.gz.sig)"

          # Windows (NSIS preferred, fallback to MSI)
          WIN_BUNDLE=$(find_file "*-setup.nsis.zip")
          WIN_SIG=$(read_sig "*-setup.nsis.zip.sig")
          if [[ -z "$WIN_BUNDLE" || -z "$WIN_SIG" ]]; then
            WIN_BUNDLE=$(find_file "*.msi.zip")
            WIN_SIG=$(read_sig "*.msi.zip.sig")
          fi
          require_non_empty "$WIN_BUNDLE" "Windows updater bundle (*.nsis.zip or *.msi.zip)"
          require_non_empty "$WIN_SIG" "Windows updater signature (*.nsis.zip.sig or *.msi.zip.sig)"

          # Build the JSON — use jq for proper escaping
          jq -n \
            --arg version "$VERSION_NUM" \
            --arg notes "Synergy Devnet Control Center ${VERSION}" \
            --arg pub_date "$RELEASE_DATE" \
            --arg darwin_arm_url "${BASE_URL}/${MACOS_ARM_BUNDLE}" \
            --arg darwin_arm_sig "${MACOS_ARM_SIG:-}" \
            --arg darwin_x64_url "${BASE_URL}/${MACOS_X64_BUNDLE}" \
            --arg darwin_x64_sig "${MACOS_X64_SIG:-}" \
            --arg linux_url "${BASE_URL}/${LINUX_BUNDLE}" \
            --arg linux_sig "${LINUX_SIG:-}" \
            --arg win_url "${BASE_URL}/${WIN_BUNDLE}" \
            --arg win_sig "${WIN_SIG:-}" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { url: $darwin_arm_url, signature: $darwin_arm_sig },
                "darwin-x86_64": { url: $darwin_x64_url, signature: $darwin_x64_sig },
                "linux-x86_64": { url: $linux_url, signature: $linux_sig },
                "windows-x86_64": { url: $win_url, signature: $win_sig }
              }
            }' > release-assets/latest.json

          echo "=== latest.json ==="
          cat release-assets/latest.json

      # ─── Create release on the PUBLIC releases repo ───────────────────────
      - name: Create GitHub Release on releases repo
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASES_REPO }}
          tag_name: ${{ steps.tag.outputs.version }}
          name: "Synergy Devnet Control Center ${{ steps.tag.outputs.version }}"
          body: |
            ## Synergy Devnet Control Center ${{ steps.tag.outputs.version }}

            ### Installation
            | Platform | Installer |
            |----------|-----------|
            | macOS (Apple Silicon) | `.dmg` |
            | macOS (Intel) | `.app.tar.gz` (extract and move to Applications) |
            | Linux (x86_64) | `.deb` or `.AppImage` |
            | Windows (x86_64) | `.msi` or `.exe` (NSIS) |

            ### Auto-Update
            Machines with the control panel already installed will receive this update
            automatically via the **Check for Updates** button.

            ---
            *Built from source commit ${{ github.sha }}*
          files: release-assets/*
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          draft: false
          prerelease: false
