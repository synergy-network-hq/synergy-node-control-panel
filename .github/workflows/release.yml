name: Electron Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: macos
            build_cmd: npx electron-builder --config electron-builder.yml --mac dmg zip --publish never
            artifact_glob: |
              electron-dist/*.dmg
              electron-dist/*.zip
              electron-dist/*.yml
              electron-dist/*.yaml
              electron-dist/*.blockmap
          - os: ubuntu-22.04
            artifact_name: linux
            build_cmd: npx electron-builder --config electron-builder.yml --linux deb AppImage --publish never
            artifact_glob: |
              electron-dist/*.deb
              electron-dist/*.AppImage
              electron-dist/*.yml
              electron-dist/*.yaml
              electron-dist/*.blockmap
          - os: windows-latest
            artifact_name: windows
            build_cmd: npx electron-builder --config electron-builder.yml --win nsis --publish never
            artifact_glob: |
              electron-dist/*.exe
              electron-dist/*.yml
              electron-dist/*.yaml
              electron-dist/*.blockmap

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm install

      - name: Create .env from testbeta example if missing
        shell: bash
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env
          fi

      - name: Install Linux packaging dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libarchive-tools \
            fakeroot \
            rpm \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Build renderer assets
        run: npm run build

      - name: Build headless control-service runtime
        run: cargo build --manifest-path src-tauri/Cargo.toml --bin control-service --release --no-default-features

      - name: Stage Electron runtime bundle
        run: node scripts/electron/prepare-runtime.mjs

      - name: Build installer
        shell: bash
        run: ${{ matrix.build_cmd }}

      - name: Remove duplicate builder-debug.yml from artifacts
        shell: bash
        run: rm -f electron-dist/builder-debug.yml

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}

  publish-releases-repo:
    name: Publish installers to releases repo
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release (releases repo)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          repo="synergy-network-hq/synergy-node-control-panel-releases"
          title="Synergy Node Control Panel ${tag#v}"
          notes="Automated build from ${GITHUB_REPOSITORY}@${GITHUB_SHA}."

          shopt -s globstar nullglob
          files=(
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.yml
            artifacts/**/*.yaml
            artifacts/**/*.blockmap
          )

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No installer artifacts found under ./artifacts"
            ls -R artifacts || true
            exit 1
          fi

          # Deduplicate files by basename (keep first occurrence)
          declare -A seen
          unique_files=()
          for f in "${files[@]}"; do
            base="$(basename "$f")"
            if [[ -z "${seen[$base]:-}" ]]; then
              seen[$base]=1
              unique_files+=("$f")
            else
              echo "Skipping duplicate: $f (already have $base)"
            fi
          done

          if gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
            echo "Release already exists: $repo@$tag"
          else
            gh release create "$tag" --repo "$repo" --title "$title" --notes "$notes"
          fi

          gh release upload "$tag" "${unique_files[@]}" --repo "$repo" --clobber
