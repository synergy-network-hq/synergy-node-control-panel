name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.3.1)'
        required: true

env:
  RELEASES_REPO: synergy-network-hq/devnet-control-panel-releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      # env_config.rs embeds .env at compile time via include_str! — provide a placeholder
      - name: Create .env if missing
        shell: bash
        run: |
          if [ ! -f .env ]; then
            echo "# CI placeholder" > .env
          fi

      - name: Install Linux dependencies
        if: matrix.label == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1-dev

      - name: Build Tauri app
        shell: bash
        run: npx tauri build --target ${{ matrix.target }}

      # ── Collect artifacts ────────────────────────────────────────────────────

      - name: Collect artifacts (macOS)
        if: matrix.label == 'macos-arm64'
        run: |
          mkdir -p artifacts
          cp src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg          artifacts/ 2>/dev/null || true
          cp src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz artifacts/ 2>/dev/null || true
          cp src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.sig         artifacts/ 2>/dev/null || true
          ls -la artifacts/

      - name: Collect artifacts (Linux)
        if: matrix.label == 'linux-x64'
        run: |
          mkdir -p artifacts
          cp src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb                  artifacts/ 2>/dev/null || true
          cp src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage         artifacts/ 2>/dev/null || true
          cp src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz  artifacts/ 2>/dev/null || true
          cp src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.sig              artifacts/ 2>/dev/null || true
          ls -la artifacts/

      - name: Collect artifacts (Windows)
        if: matrix.label == 'windows-x64'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts
          Copy-Item "src-tauri\target\${{ matrix.target }}\release\bundle\nsis\*.exe"  artifacts\ -ErrorAction SilentlyContinue
          Copy-Item "src-tauri\target\${{ matrix.target }}\release\bundle\nsis\*.zip"  artifacts\ -ErrorAction SilentlyContinue
          Copy-Item "src-tauri\target\${{ matrix.target }}\release\bundle\nsis\*.sig"  artifacts\ -ErrorAction SilentlyContinue
          Copy-Item "src-tauri\target\${{ matrix.target }}\release\bundle\msi\*.msi"   artifacts\ -ErrorAction SilentlyContinue
          Copy-Item "src-tauri\target\${{ matrix.target }}\release\bundle\msi\*.zip"   artifacts\ -ErrorAction SilentlyContinue
          Copy-Item "src-tauri\target\${{ matrix.target }}\release\bundle\msi\*.sig"   artifacts\ -ErrorAction SilentlyContinue
          Get-ChildItem artifacts\

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.label }}
          path: artifacts/*

  # ── Publish: generate latest.json and create release on public releases repo ──

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Determine version tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find all-artifacts -type f -exec cp {} release-assets/ \;
          echo "=== Release assets ==="
          ls -la release-assets/

      - name: Generate latest.json
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          VERSION_NUM="${VERSION#v}"
          RELEASE_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          BASE_URL="https://github.com/${{ env.RELEASES_REPO }}/releases/download/${VERSION}"

          find_file() {
            local result
            result=$(find release-assets -name "$1" -type f 2>/dev/null | head -1)
            [[ -n "$result" ]] && basename "$result" || echo ""
          }

          read_sig() {
            local f
            f=$(find release-assets -name "$1" -type f 2>/dev/null | head -1)
            [[ -f "$f" ]] && cat "$f" || echo ""
          }

          # macOS (ARM — the only macOS build)
          MACOS_BUNDLE=$(find_file "*.app.tar.gz")
          MACOS_SIG=$(read_sig "*.app.tar.gz.sig")

          # Linux (AppImage preferred for updater)
          LINUX_BUNDLE=$(find_file "*.AppImage.tar.gz")
          LINUX_SIG=$(read_sig "*.AppImage.tar.gz.sig")

          # Windows (NSIS preferred, fallback MSI)
          WIN_BUNDLE=$(find_file "*-setup.nsis.zip")
          WIN_SIG=$(read_sig "*-setup.nsis.zip.sig")
          if [[ -z "$WIN_BUNDLE" ]]; then
            WIN_BUNDLE=$(find_file "*.msi.zip")
            WIN_SIG=$(read_sig "*.msi.zip.sig")
          fi

          jq -n \
            --arg version    "$VERSION_NUM" \
            --arg notes      "Synergy Devnet Control Center ${VERSION}" \
            --arg pub_date   "$RELEASE_DATE" \
            --arg mac_url    "${BASE_URL}/${MACOS_BUNDLE}" \
            --arg mac_sig    "${MACOS_SIG}" \
            --arg linux_url  "${BASE_URL}/${LINUX_BUNDLE}" \
            --arg linux_sig  "${LINUX_SIG}" \
            --arg win_url    "${BASE_URL}/${WIN_BUNDLE}" \
            --arg win_sig    "${WIN_SIG}" \
            '{
              version:  $version,
              notes:    $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { url: $mac_url,   signature: $mac_sig   },
                "linux-x86_64":   { url: $linux_url, signature: $linux_sig },
                "windows-x86_64": { url: $win_url,   signature: $win_sig   }
              }
            }' > release-assets/latest.json

          echo "=== latest.json ==="
          cat release-assets/latest.json

      - name: Create GitHub Release on releases repo
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASES_REPO }}
          tag_name: ${{ steps.tag.outputs.version }}
          name: "Synergy Devnet Control Center ${{ steps.tag.outputs.version }}"
          body: |
            ## Synergy Devnet Control Center ${{ steps.tag.outputs.version }}

            ### Installation
            | Platform | Download |
            |----------|----------|
            | macOS (Apple Silicon) | `.dmg` |
            | Linux (x86_64) | `.deb` or `.AppImage` |
            | Windows (x86_64) | `.exe` (NSIS installer) |

            ### Auto-Update
            Machines with the control panel already installed will be notified via
            the **Check for Updates** button in the app.

            ---
            *Built from commit ${{ github.sha }}*
          files: release-assets/*
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          draft: false
          prerelease: false
