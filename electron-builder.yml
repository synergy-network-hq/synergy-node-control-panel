appId: io.synergy-network.node-control-panel
productName: Synergy Node Control Panel

directories:
  output: electron-dist
  buildResources: src-tauri/icons

files:
  - dist/**/*
  - electron/**/*
  - package.json

extraResources:
  - from: build/electron-runtime/control-service
    to: control-service
  - from: binaries
    to: binaries

afterPack: scripts/electron/afterPack.cjs

publish:
  provider: github
  owner: synergy-network-hq
  repo: synergy-node-control-panel-releases

mac:
  category: public.app-category.developer-tools
  icon: src-tauri/icons/icon.icns
  identity: null
  target:
    - dmg
    - zip

win:
  icon: src-tauri/icons/icon.ico
  target:
    - nsis

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  icon: src-tauri/icons
  target:
    - deb
    - AppImage
