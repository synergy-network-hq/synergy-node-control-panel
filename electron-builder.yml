appId: io.synergy-network.node-control-panel
productName: Synergy Node Control Panel

directories:
  output: electron-dist
  buildResources: control-service/icons

files:
  - dist/**/*
  - electron/**/*
  - package.json

extraResources:
  - from: build/electron-runtime/control-service
    to: control-service
  - from: binaries
    to: binaries
  - from: testbeta/runtime
    to: testbeta/runtime
  - from: scripts/testbeta
    to: scripts/testbeta
  - from: scripts/cleanup
    to: scripts/cleanup
  - from: scripts/reset-testbeta.sh
    to: scripts/reset-testbeta.sh
  - from: guides/SYNERGY_TESTBETA_CONTROL_PANEL_USER_MANUAL.md
    to: guides/SYNERGY_TESTBETA_CONTROL_PANEL_USER_MANUAL.md

publish:
  provider: github
  owner: synergy-network-hq
  repo: synergy-node-control-panel-releases

mac:
  category: public.app-category.developer-tools
  icon: control-service/icons/icon.icns
  identity: null
  artifactName: "Synergy.Node.Control.Panel-${version}-${arch}.${ext}"
  target:
    - dmg
    - zip

win:
  icon: control-service/icons/icon.ico
  target:
    - nsis

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  icon: control-service/icons
  target:
    - deb
    - AppImage
